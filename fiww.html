<!DOCTYPE html>
<html>
<head>
<title>Puzzle ikan</title>
</head>

<body>

<h1>🔐 Puzzle bawal</h1>

<p>Apa kode rahasianya?</p>

<input id="jawaban">
<button onclick="cek()">Jawab</button>

<p id="hasil"></p>

<script>
function cek(){
let jawaban = document.getElementById("jawaban").value;

if(jawaban == "5555"){
document.getElementById("hasil").innerHTML="Benar bro 🎉";
}else{
document.getElementById("hasil").innerHTML="Salah,pftt";
}
}
</script>

</body>
</html>
